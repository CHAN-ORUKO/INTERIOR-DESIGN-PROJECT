<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Interior | Bespoke Design Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; color: #222; font-family: 'Georgia', serif; }
        .navbar { padding: 20px 0; background: #fff !important; }
        .navbar-brand { font-weight: 800; letter-spacing: 2px; color: #111 !important; }
        .nav-link { font-family: 'Sans-Serif', system-ui; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1.5px; color: #666 !important; padding: 0.5rem 1.2rem !important; }
        .nav-link:hover, .nav-link.active { color: #111 !important; font-weight: bold; }
        .hero-section { min-height: 75vh; display: flex; align-items: center; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=1200') no-repeat center center/cover; color: #fff; }
        .btn-luxury { background: #fff; color: #111; border: 1px solid #fff; border-radius: 0; padding: 12px 30px; font-family: system-ui; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s; }
        .btn-luxury:hover { background: transparent; color: #fff; }
        footer { font-family: system-ui; font-size: 0.75rem; letter-spacing: 1px; color: #888; background: #111; padding: 30px 0; }
    </style>
</head>
<body>

    <!-- MASTER NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand text-uppercase" href="/">Atelier Interior</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="/packages/">Packages</a>
                <a class="nav-link" href="/about/">About</a>
                <a class="nav-link" href="/contact/">Contact</a>
            </div>
        </div>
    </nav>

    <!-- HERO SPLASH -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="display-3 fw-light text-uppercase mb-3" style="letter-spacing: 4px;">Elevated Spaces</h1>
            <p class="lead mb-4" style="font-style: italic; font-family: 'Georgia';">Bespoke interior design configurations tailored to your lifestyle.</p>
            <a href="/packages/" class="btn btn-luxury">Explore Our Packages</a>
        </div>
    </section>

    <footer class="text-center mt-5">
        <p class="m-0">&copy; 2026 Atelier Interior Studio. All rights reserved.</p>
    </footer>

</body>
</html>
