<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Atelier Interior</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fcfbfa; color: #222; font-family: 'Georgia', serif; }
        .navbar { padding: 20px 0; background: #fff !important; }
        .navbar-brand { font-weight: 800; letter-spacing: 2px; color: #111 !important; }
        .nav-link { font-family: system-ui; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1.5px; color: #666 !important; padding: 0.5rem 1.2rem !important; }
        .nav-link:hover, .nav-link.active { color: #111 !important; font-weight: bold; }
        .form-control { border: none; border-bottom: 1px solid #ccc; background: transparent; border-radius: 0; padding: 12px 0; font-family: system-ui; font-size: 0.9rem; }
        .form-control:focus { background: transparent; border-color: #111; box-shadow: none; }
        .btn-submit-luxury { background: #111; color: #fff; border: 1px solid #111; border-radius: 0; padding: 12px; font-family: system-ui; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; width: 100%; transition: all 0.3s; }
        .btn-submit-luxury:hover { background: transparent; color: #111; }
        footer { font-family: system-ui; font-size: 0.75rem; letter-spacing: 1px; color: #888; background: #111; padding: 30px 0; }
    </style>
</head>
<body>

    <!-- MASTER NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand text-uppercase" href="/">Atelier Interior</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/packages/">Packages</a>
                <a class="nav-link" href="/about/">About</a>
                <a class="nav-link active" href="/contact/">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container my-5 py-4" style="max-width: 550px;">
        <div class="text-center mb-5">
            <h1 class="display-5 text-uppercase fw-light mb-3" style="letter-spacing: 2px;">Work With Us</h1>
            <div class="mx-auto bg-dark mb-3" style="width: 50px; height: 1px;"></div>
            <p class="text-muted small text-uppercase" style="font-family: system-ui; letter-spacing: 1px;">Let's bring your vision to life.</p>
        </div>

        <form method="POST" action="/contact/" class="mt-4">
            {% csrf_token %}
            <div class="mb-4">
                <input type="text" name="name" class="form-control" placeholder="YOUR NAME" required>
            </div>
            <div class="mb-4">
                <input type="email" name="email" class="form-control" placeholder="EMAIL ADDRESS" required>
            </div>
            <div class="mb-4">
                <textarea name="message" class="form-control" rows="4" placeholder="TELL US ABOUT YOUR PROJECT..." required></textarea>
            </div>
            <button type="submit" class="btn btn-submit-luxury mt-3">Send Inquiry</button>
        </form>
    </main>

    <footer class="text-center mt-5">
        <p class="m-0">&copy; 2026 Atelier Interior Studio. All rights reserved.</p>
    </footer>

</body>
</html>
